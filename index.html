<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="box">
        <div class="top-part">
            <div class="title-part">
                <h2>Typing Test..........</h2>
                <div class="sound">
                    <span>Key sound ON/OFF</span>
                    <input type="checkbox" name="" id="">
                </div>
            </div>
            <hr>
            <div class="type-content">
                <input type="text">
                <p>
                    Lorem ipsum dolor sit amet, consectetur adipisicing elit. Dolorum ratione, dignissimos sapiente a

                    placeat.
                </p>
            </div>

        </div>
        <div class="bottom-part">
            <p class="time-left">Time-Left: 0</p>
            <p class="mistake">Mistakes : 0</p>
            <p class="WPM">WPM : 0</p>

        </div>


    </div>
