<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Rush</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="logo">
        <img src="navbar.jpg" alt="navbar-img">
        <h2>Typing Rush..</h2>
    </div>



    <div class="box">
        <div class="top-part">
            <div class="title-part">
                <h2>Test Your Typing Speed.....</h2>
                <div class="sound">
                    <span>Key sound ON/OFF</span>
                    <input type="checkbox" name="" id="">
                </div>
            </div>
            <hr>
            <div class="type-content">
                <input type="text" id="typeValue">
                <p>
                
                </p>
            </div>

        </div>
        <div class="bottom-part">
            <p class="time-left">Time-Left: 0</p>
            <p class="mistakes">Mistakes : 0</p>
            <p class="WPM">WPM : 0</p>
            <P class="CPM">CPM : 0</p>
            <button>Try Again</button>

        </div>
    </div>

    <footer>

        <p class="ftr-text">Made by Samriddha Poudel</p>
        <a href="https://github.com/Samriddha-Poudel" class="github-link">
            <i class="fa-brands fa-github"></i>
        </a>


    </footer>

    <script src="para.js"></script>
    <script src="script.js"></script>
</body>

</html>
